<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Plot Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            max-width: 800px;
            width: 90%;
        }

        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }

        .subtitle {
            color: #888;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .round-info {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .emoji-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
            margin: 1.5rem 0;
        }

        .emoji-panel {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 1.5rem;
            min-height: 160px;
            display: flex;
            flex-direction: column;
        }

        .emoji-panel-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.8rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #333;
        }

        .label-sft { color: #00b894; }
        .label-rl { color: #74b9ff; }

        .emoji-content {
            font-size: 2.8rem;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 6px;
            line-height: 1.5;
            word-break: break-word;
        }

        button {
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active { transform: scale(0.96); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-primary { background: #6c5ce7; color: #fff; }

        .btn-start {
            background: #6c5ce7;
            color: #fff;
            padding: 16px 48px;
            font-size: 1.3rem;
        }

        /* Flip Card */
        .flip-card {
            perspective: 800px;
            width: 320px;
            height: 160px;
            margin: 1.5rem auto;
            cursor: pointer;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .flip-card-front {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            box-shadow: 0 4px 24px rgba(108, 92, 231, 0.3);
        }

        .flip-card-front:hover {
            box-shadow: 0 6px 32px rgba(108, 92, 231, 0.5);
        }

        .flip-card-front .card-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .flip-card-front .card-label {
            font-size: 1.1rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        .flip-card-back {
            background: linear-gradient(135deg, #00b894, #55efc4);
            transform: rotateY(180deg);
            box-shadow: 0 4px 24px rgba(0, 184, 148, 0.3);
            padding: 1rem;
        }

        .flip-card-back .answer-text {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0f0f1a;
            line-height: 1.3;
        }

        .round-counter {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 12px 24px;
            margin-top: 1.5rem;
            font-size: 1rem;
            color: #888;
        }

        .round-counter strong { color: #fff; }

        .loading {
            color: #888;
            font-size: 1.2rem;
        }

        .loading::after {
            content: '';
            animation: dots 1.5s steps(4) infinite;
        }

        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Start Screen -->
        <div id="start-screen">
            <h1>🎬 Emoji Plot Quiz</h1>
            <p class="subtitle">Guess the movie or TV series from its emoji plot!</p>
            <br><br>
            <button class="btn-start" onclick="startGame()">Start Game</button>
        </div>

        <!-- Loading Screen -->
        <div id="loading-screen" class="hidden">
            <h1>🎬 Emoji Plot Quiz</h1>
            <br>
            <p class="loading">Generating emoji plots with AI</p>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="hidden">
            <h1>🎬 Emoji Plot Quiz</h1>
            <p class="round-info">Round <span id="round">1</span> of <span id="total">5</span></p>

            <div class="emoji-columns">
                <div class="emoji-panel">
                    <div class="emoji-panel-label label-sft">SFT Model</div>
                    <div class="emoji-content" id="emoji-sft"></div>
                </div>
                <div class="emoji-panel">
                    <div class="emoji-panel-label label-rl">RL Model</div>
                    <div class="emoji-content" id="emoji-rl"></div>
                </div>
            </div>

            <div class="flip-card" id="flip-card" onclick="revealAnswer()">
                <div class="flip-card-inner">
                    <div class="flip-card-front">
                        <div class="card-icon">❓</div>
                        <div class="card-label">Tap to reveal answer</div>
                    </div>
                    <div class="flip-card-back">
                        <div class="answer-text" id="answer-text"></div>
                    </div>
                </div>
            </div>

            <button class="btn-primary hidden" id="next-btn" onclick="nextRound()">Next →</button>

            <div class="round-counter">
                Round <strong><span id="round2">1</span></strong> / <strong><span id="total2">5</span></strong>
            </div>
        </div>

        <!-- Final Screen -->
        <div id="final-screen" class="hidden">
            <h1>🎬 That's a wrap!</h1>
            <br>
            <h2>Thanks for playing!</h2>
            <br><br>
            <button class="btn-start" onclick="startGame()">Play Again</button>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let gameId = null;
        let revealed = false;
        let pendingData = null;
        let isDone = false;

        function showScreen(id) {
            ['start-screen', 'loading-screen', 'game-screen', 'final-screen']
                .forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function startGame() {
            showScreen('loading-screen');
            const res = await fetch(`${API}/api/start`);
            const data = await res.json();
            gameId = data.game_id;
            showRound(data);
        }

        function showRound(data) {
            showScreen('game-screen');
            revealed = false;
            isDone = false;
            pendingData = null;

            document.getElementById('emoji-sft').textContent = data.emojis_sft;
            document.getElementById('emoji-rl').textContent = data.emojis_rl;
            document.getElementById('round').textContent = data.round;
            document.getElementById('total').textContent = data.total;
            document.getElementById('round2').textContent = data.round;
            document.getElementById('total2').textContent = data.total;

            const card = document.getElementById('flip-card');
            card.classList.remove('flipped');
            card.style.pointerEvents = 'auto';

            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('answer-text').textContent = '';
        }

        async function revealAnswer() {
            if (revealed) return;
            revealed = true;

            const res = await fetch(`${API}/api/guess`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ game_id: gameId, guess: '__reveal__' })
            });
            const data = await res.json();

            document.getElementById('answer-text').textContent = data.answer;
            document.getElementById('flip-card').classList.add('flipped');

            isDone = data.done;
            pendingData = data;

            setTimeout(() => {
                document.getElementById('next-btn').classList.remove('hidden');
                document.getElementById('next-btn').textContent = data.done ? 'Finish' : 'Next →';
            }, 700);
        }

        function nextRound() {
            if (isDone) {
                showScreen('final-screen');
            } else {
                showRound(pendingData);
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                const gameScreen = document.getElementById('game-screen');
                if (gameScreen.classList.contains('hidden')) return;

                if (!revealed) {
                    revealAnswer();
                } else if (!document.getElementById('next-btn').classList.contains('hidden')) {
                    nextRound();
                }
            }
        });
    </script>
</body>
</html>
